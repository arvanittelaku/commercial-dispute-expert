name: SEO checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run seo:generate

      - name: Check generated SEO files are committed
        run: |
          git diff --exit-code public/sitemap.xml public/robots.txt || (
            echo "public/sitemap.xml or public/robots.txt is out of date. Run npm run seo:generate and commit."
            exit 1
          )

      - run: npm run seo:verify

      - run: npm run seo:verify:ssr
